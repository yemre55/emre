services:
  mysql:
    image: mysql:8.0
    container_name: erp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - erp_mysql_data:/var/lib/mysql
      # İlk oluşturmada (veri klasörü boşken) otomatik çalışır:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: erp_dashboard
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # DB_HOST burada bilinçli olarak "mysql" (docker-compose servis adı) —
      # .env dosyanızdaki DB_HOST değerini ezmemesi için burada sabitliyoruz.
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EPOSTA_GONDEREN: ${EPOSTA_GONDEREN}
      EPOSTA_ALICI: ${EPOSTA_ALICI}
    ports:
      - "8501:8501"

volumes:
  erp_mysql_data:
